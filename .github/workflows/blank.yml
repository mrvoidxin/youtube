name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Accept SDK licenses
        run: yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Gradle 8.7
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Verify project structure
        run: |
          echo "=== Checking project root ==="
          ls -la
          echo ""
          echo "settings.gradle.kts exists: $([ -f settings.gradle.kts ] && echo YES || echo NO)"
          echo "build.gradle.kts exists: $([ -f build.gradle.kts ] && echo YES || echo NO)"
          echo "app/build.gradle.kts exists: $([ -f app/build.gradle.kts ] && echo YES || echo NO)"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeClone-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

          echo test, and deploy your project.
